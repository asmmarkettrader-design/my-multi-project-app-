name: ZIP-Based Multi-Project EXE & APK Compiler

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_project_name:
        description: 'اگر مینوئلی بلڈ کرنا ہے تو زپ فائل کا نام لکھیں (بغیر .zip کے)'
        required: false
        default: ''

jobs:
  # سٹیپ 1: تبدیل شدہ یا نئی زپ فائلز کو ڈیٹیکٹ کرنا
  detect-zip-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_zips: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # تمام ہسٹری لے کر ائے گا تاکہ موازنہ خراب نہ ہو

    - name: Get Changed ZIP Files
      id: set-matrix
      run: |
        # اگر صارف نے مینوئلی نام ٹائپ کیا ہے
        if [ "${{ github.event.inputs.force_project_name }}" != "" ]; then
          echo "Manual trigger for project: ${{ github.event.inputs.force_project_name }}"
          echo "matrix=[\"${{ github.event.inputs.force_project_name }}\"]" >> $GITHUB_OUTPUT
        else
          # پش پر تبدیلیاں چیک کرنا (اگر پہلی کمٹ ہو تو یہ پوری ہسٹری چیک کرے گا)
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^projects/.*\.zip$' | cut -d/ -f2 | sed 's/\.zip$//' | sort -u | jq -R . | jq -s -c .)
          else
            CHANGED=$(git ls-files projects/ | grep '\.zip$' | cut -d/ -f2 | sed 's/\.zip$//' | sort -u | jq -R . | jq -s -c .)
          fi
          
          if [ "$CHANGED" == "[]" ] || [ -z "$CHANGED" ]; then
            echo "No new or updated ZIP projects detected."
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "Changed ZIP projects: $CHANGED"
            echo "matrix=$CHANGED" >> $GITHUB_OUTPUT
          fi
        fi

  # سٹیپ 2: ونڈوز (EXE) بلڈ جاب
  build-windows-exe:
    needs: detect-zip-changes
    if: ${{ needs.detect-zip-changes.outputs.changed_zips != '[]' && needs.detect-zip-changes.outputs.changed_zips != '' }}
    runs-on: windows-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-zip-changes.outputs.changed_zips) }}
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      shell: powershell
      run: |
        if (Test-Path "projects/${{ matrix.project }}.zip") {
          New-Item -ItemType Directory -Force -Path "projects/${{ matrix.project }}_extracted"
          Expand-Archive -Path "projects/${{ matrix.project }}.zip" -DestinationPath "projects/${{ matrix.project }}_extracted" -Force
        } else {
          Write-Error "ZIP file projects/${{ matrix.project }}.zip not found!"
          exit 1
        }

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller & Dependencies
      shell: powershell
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==6.9.0
        if (Test-Path "projects/${{ matrix.project }}_extracted/requirements.txt") {
          pip install -r "projects/${{ matrix.project }}_extracted/requirements.txt"
        }

    - name: Compile to EXE (Windows)
      shell: powershell
      run: |
        # چیک کرنا کہ سورس فائل موجود ہے یا نہیں
        if (Test-Path "projects/${{ matrix.project }}_extracted/src/main.py") {
          pyinstaller --onefile --windowed --distpath "./projects/build_outputs/${{ matrix.project }}" "projects/${{ matrix.project }}_extracted/src/main.py"
        } else {
          # اگر زپ کے اندر ڈائریکٹ main.py پڑی ہو بغیر src کے
          pyinstaller --onefile --windowed --distpath "./projects/build_outputs/${{ matrix.project }}" "projects/${{ matrix.project }}_extracted/main.py"
        }

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-windows-exe
        path: ./projects/build_outputs/${{ matrix.project }}/

  # سٹیپ 3: اینڈرائیڈ (APK) بلڈ جاب
  build-android-apk:
    needs: detect-zip-changes
    if: ${{ needs.detect-zip-changes.outputs.changed_zips != '[]' && needs.detect-zip-changes.outputs.changed_zips != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-zip-changes.outputs.changed_zips) }}
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        mkdir -p "projects/${{ matrix.project }}_extracted"
        unzip -o "projects/${{ matrix.project }}.zip" -d "projects/${{ matrix.project }}_extracted"

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip3 install --user --upgrade buildozer Cython virtualenv

    - name: Compile to APK (Android)
      run: |
        cd "projects/${{ matrix.project }}_extracted"
        if [ ! -f buildozer.spec ]; then
          ~/.local/bin/buildozer init
        fi
        ~/.local/bin/buildozer -v android debug
        
        mkdir -p ../build_outputs/${{ matrix.project }}
        cp bin/*.apk ../build_outputs/${{ matrix.project }}/ 2>/dev/null || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-android-apk
        path: ./projects/build_outputs/${{ matrix.project }}/
