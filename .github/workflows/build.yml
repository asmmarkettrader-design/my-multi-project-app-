name: ZIP-Based Multi-Project EXE & APK Compiler

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_project_name:
        description: 'زپ فائل کا نام لکھیں (بغیر .zip کے)'
        required: false
        default: ''

jobs:
  detect-zip-changes:
    runs-on: ubuntu-latest
    outputs:
      changed_zips: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get Changed ZIP Files
      id: set-matrix
      run: |
        if [ "${{ github.event.inputs.force_project_name }}" != "" ]; then
          echo "matrix=[\"${{ github.event.inputs.force_project_name }}\"]" >> $GITHUB_OUTPUT
        else
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '^projects/.*\.zip$' | cut -d/ -f2 | sed 's/\.zip$//' | sort -u | jq -R . | jq -s -c .)
          else
            CHANGED=$(git ls-files projects/ | grep '\.zip$' | cut -d/ -f2 | sed 's/\.zip$//' | sort -u | jq -R . | jq -s -c .)
          fi
          
          if [ "$CHANGED" == "[]" ] || [ -z "$CHANGED" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$CHANGED" >> $GITHUB_OUTPUT
          fi
        fi

  build-windows-exe:
    needs: detect-zip-changes
    if: ${{ needs.detect-zip-changes.outputs.changed_zips != '[]' && needs.detect-zip-changes.outputs.changed_zips != '' }}
    runs-on: windows-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-zip-changes.outputs.changed_zips) }}
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Fix Windows Output Encoding
      shell: powershell
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::InputEncoding = [System.Text.Encoding]::UTF8

    - name: Unzip Project Files
      shell: powershell
      run: |
        $projName = @"
        ${{ matrix.project }}
        "@.Trim()
        
        $zipPath = "projects/$projName.zip"
        $extractPath = "projects/${projName}_extracted"
        
        if (Test-Path $zipPath) {
            New-Item -ItemType Directory -Force -Path $extractPath
            Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
        } else {
            Write-Error "ZIP file $zipPath not found!"
            exit 1
        }

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PyInstaller & Dependencies
      shell: powershell
      run: |
        $projName = @"
        ${{ matrix.project }}
        "@.Trim()
        python -m pip install --upgrade pip
        pip install pyinstaller==6.9.0
        
        # پورے ایکسٹریکٹڈ فولڈر میں جہاں بھی requirements.txt ملے اسے انسٹال کرو
        $reqFile = Get-ChildItem -Path "projects/${projName}_extracted" -Filter "requirements.txt" -Recurse | Select-Object -First 1
        if ($reqFile) {
            Write-Host "Installing dependencies from: $($reqFile.FullName)"
            pip install -r $reqFile.FullName
        }

    - name: Compile to EXE (Windows)
      shell: powershell
      run: |
        $projName = @"
        ${{ matrix.project }}
        "@.Trim()
        $extractPath = "projects/${projName}_extracted"
        $outPath = "./projects/build_outputs/$projName"
        
        # جادوئی سٹیپ: یہ فولڈر کے اندر سب سے پہلی مین .py فائل خود تلاش کرے گا
        # ترجیح 1: اگر کہیں بھی main.py نام کی فائل ہے
        $mainPy = Get-ChildItem -Path $extractPath -Filter "main.py" -Recurse | Select-Object -First 1
        
        # ترجیح 2: اگر main.py نہیں ہے تو فولڈر کی کوئی بھی پہلی .py فائل اٹھا لو
        if (-not $mainPy) {
            $mainPy = Get-ChildItem -Path $extractPath -Filter "*.py" -Recurse | Select-Object -First 1
        }
        
        if ($mainPy) {
            Write-Host "Found entry point Python file at: $($mainPy.FullName)"
            pyinstaller --onefile --windowed --distpath $outPath $mainPy.FullName
        } else {
            Write-Error "No Python (.py) script found anywhere inside the extracted ZIP file!"
            exit 1
        }

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-windows-exe
        path: ./projects/build_outputs/

  build-android-apk:
    needs: detect-zip-changes
    if: ${{ needs.detect-zip-changes.outputs.changed_zips != '[]' && needs.detect-zip-changes.outputs.changed_zips != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-zip-changes.outputs.changed_zips) }}
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        mkdir -p "projects/${{ matrix.project }}_extracted"
        unzip -o "projects/${{ matrix.project }}.zip" -d "projects/${{ matrix.project }}_extracted"

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip3 install --user --upgrade buildozer Cython virtualenv

    - name: Compile to APK (Android)
      run: |
        cd "projects/${{ matrix.project }}_extracted"
        # اگر زپ کے اندر ایک اور فولڈر ہے تو اس کے اندر منتقل ہو جاؤ
        if [ -d "${{ matrix.project }}" ]; then
          cd "${{ matrix.project }}"
        fi
        
        if [ ! -f buildozer.spec ]; then
          ~/.local/bin/buildozer init
        fi
        ~/.local/bin/buildozer -v android debug
        mkdir -p ../../build_outputs/"${{ matrix.project }}"
        cp bin/*.apk ../../build_outputs/"${{ matrix.project }}"/ 2>/dev/null || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-android-apk
        path: ./projects/build_outputs/
