name: Ultimate ZIP & RAR Multi-Project Compiler

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_project_name:
        description: 'اگر مینوئلی رن کرنا ہے تو فائل کا نام لکھیں (بغیر .zip یا .rar کے)'
        required: false
        default: ''

jobs:
  detect-archives:
    runs-on: ubuntu-latest
    outputs:
      changed_archives: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get Changed ZIP or RAR Files
      id: set-matrix
      run: |
        if [ "${{ github.event.inputs.force_project_name }}" != "" ]; then
          echo "matrix=[\"${{ github.event.inputs.force_project_name }}\"]" >> $GITHUB_OUTPUT
        else
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^projects/.*\.(zip|rar)$' | cut -d/ -f2 | sed -E 's/\.(zip|rar)$//' | sort -u | jq -R . | jq -s -c .)
          else
            CHANGED=$(git ls-files projects/ | grep -E '\.(zip|rar)$' | cut -d/ -f2 | sed -E 's/\.(zip|rar)$//' | sort -u | jq -R . | jq -s -c .)
          fi
          
          if [ "$CHANGED" == "[]" ] || [ -z "$CHANGED" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$CHANGED" >> $GITHUB_OUTPUT
          fi
        fi

  build-windows-exe:
    needs: detect-archives
    if: ${{ needs.detect-archives.outputs.changed_archives != '[]' && needs.detect-archives.outputs.changed_archives != '' }}
    runs-on: windows-2019
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-archives.outputs.changed_archives) }}
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Fix Output Encoding
      shell: powershell
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::InputEncoding = [System.Text.Encoding]::UTF8

    - name: Extract Archive (ZIP or RAR)
      shell: powershell
      run: |
        $proj = "${{ matrix.project }}".Trim()
        $extractPath = "projects/${proj}_extracted"
        New-Item -ItemType Directory -Force -Path $extractPath
        
        $zipFile = "projects/$proj.zip"
        $rarFile = "projects/$proj.rar"
        
        if (Test-Path $zipFile) {
            Expand-Archive -Path $zipFile -DestinationPath $extractPath -Force
        } elseif (Test-Path $rarFile) {
            & 7z x $rarFile "-o$extractPath" -y
        } else {
            Write-Error "No archive found for $proj"
            exit 1
        }

    - name: Set up Python (32-bit for Universal Compatibility)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: 'x86'

    - name: Deep Scan & Install Dependencies
      shell: powershell
      run: |
        $proj = "${{ matrix.project }}".Trim()
        python -m pip install --upgrade pip
        pip install pyinstaller==6.9.0
        
        $reqs = Get-ChildItem -Path "projects/${proj}_extracted" -Filter "requirements.txt" -Recurse
        foreach ($req in $reqs) {
            Write-Host "Installing dependencies from found file: $($req.FullName)"
            (Get-Content $req.FullName) -replace 'sqlite3-utils', 'sqlite-utils' | Set-Content $req.FullName
            pip install -r $req.FullName
        }

    - name: Deep Scan & Compile to EXE (Strict Compile Folder Path)
      shell: powershell
      run: |
        $proj = "${{ matrix.project }}".Trim()
        $extractPath = "projects/${proj}_extracted"
        
        # بالکل روٹ لیول پر ایک مستقل 'compile' فولڈر بنانا
        $outPath = "$echo $env:GITHUB_WORKSPACE\compile"
        if (-not (Test-Path $outPath)) {
            New-Item -ItemType Directory -Force -Path $outPath
        }
        
        $mainPy = Get-ChildItem -Path $extractPath -Filter "main.py" -Recurse | Select-Object -First 1
        if (-not $mainPy) {
            $mainPy = Get-ChildItem -Path $extractPath -Filter "*.py" -Recurse | Select-Object -First 1
        }
        
        if ($mainPy) {
            Write-Host "Compiling entry file: $($mainPy.FullName)"
            # مینوئلی فورس کرنا کہ فائل سیدھی اسی مستقل فولڈر میں جائے
            pyinstaller --onefile --windowed --clean --distpath "$outPath" "$($mainPy.FullName)"
        } else {
            Write-Error "CRITICAL: No Python file found inside the archive structure!"
            exit 1
        }

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-windows-exe
        path: compile/
        if-no-files-found: error

  build-android-apk:
    needs: detect-archives
    if: ${{ needs.detect-archives.outputs.changed_archives != '[]' && needs.detect-archives.outputs.changed_archives != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-archives.outputs.changed_archives) }}
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Unrar & Archive Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y unrar unzip wget curl

    - name: Extract Archive (ZIP or RAR) on Linux
      run: |
        PROJ="${{ matrix.project }}"
        mkdir -p "projects/${PROJ}_extracted"
        if [ -f "projects/${PROJ}.zip" ]; then
          unzip -o "projects/${PROJ}.zip" -d "projects/${PROJ}_extracted"
        elif [ -f "projects/${PROJ}.rar" ]; then
          unrar x -o+ "projects/${PROJ}.rar" "projects/${PROJ}_extracted/"
        fi

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get install -y git zip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip3 install --user --upgrade buildozer Cython virtualenv

    # لینوکس کے گلوبل ہوم پاتھ پر ٹولز کو فکس کرنا تاکہ کسی بھی فولڈر میں بلڈوزر ایرر نہ دے
    - name: Fix Global Android SDK (sdkmanager Setup)
      run: |
        # گلوبل انوائرمنٹ بنانا
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        cd $ANDROID_HOME/cmdline-tools
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
        unzip -q cmdline.zip
        mv cmdline-tools latest
        rm cmdline.zip
        
        # پرانے بلڈوزر پاتھس کے لیے بیک اپ لنکس تیار کرنا
        mkdir -p $ANDROID_HOME/tools/bin
        ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    - name: Deep Locate and Compile to APK
      run: |
        PROJ="${{ matrix.project }}"
        TARGET_DIR=$(find "projects/${PROJ}_extracted" -name "*.py" -print -quit | xargs dirname)
        
        if [ -z "$TARGET_DIR" ]; then
          echo "No python files found for APK build."
          exit 1
        fi
        
        cd "$TARGET_DIR"
        
        # بلڈوزر کو مینوئلی مجبور کرنا کہ وہ ہمارے کنفیگرڈ گلوبل اینڈرائیڈ ایس ڈی کے پاتھ کو ہی استعمال کرے
        if [ ! -f buildozer.spec ]; then
          ~/.local/bin/buildozer init
          sed -i 's/package.name = myapp/package.name = universalapp/g' buildozer.spec
          # اینڈرائیڈ ہوم پاتھ کو فائل کے اندر فورس کرنا
          sed -i "s|# android.sdk_path = /path/to/android/sdk|android.sdk_path = $HOME/android-sdk|g" buildozer.spec
        else
          # اگر پہلے سے فائل موجود ہے تو بھی اس کا پاتھ بدل دو
          sed -i "s|# android.sdk_path = .*|android.sdk_path = $HOME/android-sdk|g" buildozer.spec
        fi
        
        # بلڈ رن کرنا
        ~/.local/bin/buildozer -v android debug
        
        # فائنل آؤٹ پٹ کو 'compile' فولڈر میں فکس کرنا
        mkdir -p $GITHUB_WORKSPACE/compile
        cp bin/*.apk $GITHUB_WORKSPACE/compile/ 2>/dev/null || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-android-apk
        path: compile/
        if-no-files-found: error
