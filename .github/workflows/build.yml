name: Ultimate ZIP & RAR Multi-Project Compiler

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      force_project_name:
        description: 'اگر مینوئلی رن کرنا ہے تو فائل کا نام لکھیں (بغیر .zip یا .rar کے)'
        required: false
        default: ''

jobs:
  # سٹیپ 1: پش یا مینوئل رن پر تمام .zip اور .rar فائلز کو ڈیٹیکٹ کرنا
  detect-archives:
    runs-on: ubuntu-latest
    outputs:
      changed_archives: ${{ steps.set-matrix.outputs.matrix }}
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get Changed ZIP or RAR Files
      id: set-matrix
      run: |
        if [ "${{ github.event.inputs.force_project_name }}" != "" ]; then
          echo "matrix=[\"${{ github.event.inputs.force_project_name }}\"]" >> $GITHUB_OUTPUT
        else
          # یہ کمانڈ .zip اور .rar دونوں کو اسکین کرتی ہے
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^projects/.*\.(zip|rar)$' | cut -d/ -f2 | sed -E 's/\.(zip|rar)$//' | sort -u | jq -R . | jq -s -c .)
          else
            CHANGED=$(git ls-files projects/ | grep -E '\.(zip|rar)$' | cut -d/ -f2 | sed -E 's/\.(zip|rar)$//' | sort -u | jq -R . | jq -s -c .)
          fi
          
          if [ "$CHANGED" == "[]" ] || [ -z "$CHANGED" ]; then
            echo "matrix=[]" >> $GITHUB_OUTPUT
          else
            echo "matrix=$CHANGED" >> $GITHUB_OUTPUT
          fi
        fi

  # سٹیپ 2: ونڈوز (EXE) بلڈ جاب - سپیشل گہری اسکیننگ کے ساتھ
  build-windows-exe:
    needs: detect-archives
    if: ${{ needs.detect-archives.outputs.changed_archives != '[]' && needs.detect-archives.outputs.changed_archives != '' }}
    runs-on: windows-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-archives.outputs.changed_archives) }}
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Fix Output Encoding
      shell: powershell
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        [Console]::InputEncoding = [System.Text.Encoding]::UTF8

    # زپ ہو یا رار، دونوں کو ایکسٹریکٹ کرنے کا جادوئی سٹیپ
    - name: Extract Archive (ZIP or RAR)
      shell: powershell
      run: |
        $proj = "${{ matrix.project }}".Trim()
        $extractPath = "projects/${proj}_extracted"
        New-Item -ItemType Directory -Force -Path $extractPath
        
        $zipFile = "projects/$proj.zip"
        $rarFile = "projects/$proj.rar"
        
        if (Test-Path $zipFile) {
            Write-Host "Extracting ZIP file..."
            Expand-Archive -Path $zipFile -DestinationPath $extractPath -Force
        } elseif (Test-Path $rarFile) {
            Write-Host "Extracting RAR file using WinRAR/Expand-Archive fallback..."
            # ونڈوز رنر پر رار کھولنے کے لیے 7-Zip یا پاور شیل کامبینیشن کا استعمال
            & 7z x $rarFile "-o$extractPath" -y
        } else {
            Write-Error "No archive found for $proj"
            exit 1
        }

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Deep Scan & Install Dependencies
      shell: powershell
      run: |
        $proj = "${{ matrix.project }}".Trim()
        python -m pip install --upgrade pip
        pip install pyinstaller==6.9.0
        
        # فولڈرز کے اندر فولڈرز میں گھس کر requirements.txt تلاش کرنا
        $reqs = Get-ChildItem -Path "projects/${proj}_extracted" -Filter "requirements.txt" -Recurse
        foreach ($req in $reqs) {
            Write-Host "Installing dependencies from found file: $($req.FullName)"
            pip install -r $req.FullName
        }

    - name: Deep Scan & Compile to EXE
      shell: powershell
      run: |
        $proj = "${{ matrix.project }}".Trim()
        $extractPath = "projects/${proj}_extracted"
        $outPath = "./projects/build_outputs/$proj"
        
        # گہرا اسکین: سب سے پہلے کہیں بھی پڑی ہوئی main.py ڈھونڈو
        $mainPy = Get-ChildItem -Path $extractPath -Filter "main.py" -Recurse | Select-Object -First 1
        
        # اگر main.py نہیں ہے، تو پورے فولڈرز کے جال میں سے سب سے پہلی پائتھون فائل اٹھا لو
        if (-not $mainPy) {
            $mainPy = Get-ChildItem -Path $extractPath -Filter "*.py" -Recurse | Select-Object -First 1
        }
        
        if ($mainPy) {
            Write-Host "Target Python file found at: $($mainPy.FullName)"
            pyinstaller --onefile --windowed --distpath $outPath $mainPy.FullName
        } else {
            Write-Error "CRITICAL: No Python file found inside the archive structure!"
            exit 1
        }

    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-windows-exe
        path: ./projects/build_outputs/

  # سٹیپ 3: اینڈرائیڈ (APK) بلڈ جاب - ایڈوانس لینوکس ان پیکر کے ساتھ
  build-android-apk:
    needs: detect-archives
    if: ${{ needs.detect-archives.outputs.changed_archives != '[]' && needs.detect-archives.outputs.changed_archives != '' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect-archives.outputs.changed_archives) }}
      fail-fast: false

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Unrar Tool (Linux)
      run: |
        sudo apt-get update
        sudo apt-get install -y unrar unzip

    - name: Extract Archive (ZIP or RAR) on Linux
      run: |
        PROJ="${{ matrix.project }}"
        mkdir -p "projects/${PROJ}_extracted"
        
        if [ -f "projects/${PROJ}.zip" ]; then
          unzip -o "projects/${PROJ}.zip" -d "projects/${PROJ}_extracted"
        elif [ -f "projects/${PROJ}.rar" ]; then
          unrar x -o+ "projects/${PROJ}.rar" "projects/${PROJ}_extracted/"
        fi

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Android Build Dependencies
      run: |
        sudo apt-get install -y git zip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev liblzma-dev lzma
        pip3 install --user --upgrade buildozer Cython virtualenv

    - name: Deep Locate and Compile to APK
      run: |
        PROJ="${{ matrix.project }}"
        # یہ کمانڈ اس اندرونی ترین فولڈر تک خود پہنچ جائے گی جہاں پایتھون فائلز موجود ہیں
        TARGET_DIR=$(find "projects/${PROJ}_extracted" -name "*.py" -print -quit | xargs dirname)
        
        if [ -z "$TARGET_DIR" ]; then
          echo "No python files found for APK build."
          exit 1
        fi
        
        echo "Navigating to deep target directory: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # اگر وہاں بلڈوزر کی کنفیگ نہیں ہے تو بناؤ
        if [ ! -f buildozer.spec ]; then
          ~/.local/bin/buildozer init
        fi
        
        ~/.local/bin/buildozer -v android debug
        
        # فائنل آؤٹ پٹ کو منتقل کرنا
        mkdir -p ../../build_outputs/"$PROJ"
        cp bin/*.apk ../../build_outputs/"$PROJ"/ 2>/dev/null || true

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.project }}-android-apk
        path: ./projects/build_outputs/
